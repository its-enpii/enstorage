openapi: 3.0.3
info:
  title: EnStorage API
  version: 1.0.0
  description: |
    Never Leaves Your Drive — EnStorage API.

    ## Authentication
    Dua mode:
    1. **Sanctum** (web/mobile user) — `Authorization: Bearer <token>`
    2. **API Key** (machine-to-machine) — `X-API-Key: en_<8>_<40>`

    Endpoint `/api-keys/*` HANYA bisa diakses via Sanctum.

    ## Scopes (API Key only)
    - `read` — GET endpoints
    - `write` — POST/PATCH/PUT (mutation non-destructive)
    - `delete` — DELETE
    - `full` — semua

    ## Rate Limit
    - Sanctum: 60 req/min per user (default Laravel `api` limiter)
    - API Key: 60 req/min per key (`X-RateLimit-Limit`, `X-RateLimit-Remaining`)

    ## Response Envelope
    Sukses: `{ success: true, data, message }` (+ `meta` untuk pagination).
    Gagal: `{ success: false, data: null, message, meta }`.

servers:
  - url: http://localhost:8080/api/v1
    description: Local Docker
  - url: https://{host}/api/v1
    variables:
      host:
        default: storage.example.com

tags:
  - name: Auth
  - name: API Keys
  - name: Google Accounts
  - name: Storage
  - name: Folders
  - name: Files

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Envelope' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200': { description: OK }
        '422': { $ref: '#/components/responses/ValidationError' }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke token saat ini)
      security: [{ sanctum: [] }]
      responses:
        '200': { description: OK }
  /auth/me:
    get:
      tags: [Auth]
      summary: Profil user aktif (+ counts via `?with_counts=1`)
      security: [{ sanctum: [] }, { apiKey: [] }]
      responses:
        '200': { description: OK }

  /api-keys:
    get:
      tags: [API Keys]
      summary: List API key milik user
      security: [{ sanctum: [] }]
      responses:
        '200': { description: OK }
    post:
      tags: [API Keys]
      summary: Buat API key baru (plaintext hanya dikembalikan SEKALI di sini)
      security: [{ sanctum: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201': { description: Created }
  /api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Cabut API key
      security: [{ sanctum: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  /google-accounts/oauth/redirect:
    get:
      tags: [Google Accounts]
      summary: Redirect ke Google OAuth consent screen
      security: [{ sanctum: [] }]
      responses:
        '302': { description: Redirect ke Google }
  /google-accounts/oauth/callback:
    get:
      tags: [Google Accounts]
      summary: OAuth callback (browser redirect dari Google)
      security: [{ sanctum: [] }]
      parameters:
        - in: query
          name: code
          schema: { type: string }
        - in: query
          name: state
          schema: { type: string }
      responses:
        '200': { description: Akun terikat }
    post:
      tags: [Google Accounts]
      summary: OAuth callback programmatic (mobile)
      security: [{ sanctum: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, state]
              properties:
                code: { type: string }
                state: { type: string }
      responses:
        '200': { description: Akun terikat }
  /google-accounts:
    get:
      tags: [Google Accounts]
      summary: List akun Google milik user
      security: [{ sanctum: [] }, { apiKey: [] }]
      responses:
        '200': { description: OK }
  /google-accounts/{id}:
    get:
      tags: [Google Accounts]
      summary: Detail akun
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Google Accounts]
      summary: Update label/active
      security: [{ sanctum: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string, maxLength: 100 }
                is_active: { type: boolean }
      responses:
        '200': { description: OK }
    delete:
      tags: [Google Accounts]
      summary: Lepas akun Google (hapus token)
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
  /google-accounts/{id}/sync-quota:
    post:
      tags: [Google Accounts]
      summary: Sync quota dari Google
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }

  /storage/summary:
    get:
      tags: [Storage]
      summary: Ringkasan total storage semua akun
      security: [{ sanctum: [] }, { apiKey: [] }]
      responses:
        '200': { description: OK }

  /folders:
    get:
      tags: [Folders]
      summary: List folder (root atau per parent)
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters:
        - in: query
          name: parent_id
          schema: { type: string, format: uuid, nullable: true }
      responses:
        '200': { description: OK }
    post:
      tags: [Folders]
      summary: Buat folder
      security: [{ sanctum: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 255 }
                parent_id: { type: string, format: uuid, nullable: true }
      responses:
        '201': { description: Created }
  /folders/{id}:
    get:
      tags: [Folders]
      summary: Detail folder (+ breadcrumb + children)
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Folders]
      summary: Rename folder
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 255 }
      responses:
        '200': { description: OK }
  /folders/{id}/move:
    put:
      tags: [Folders]
      summary: Pindah folder (null = root)
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parent_id: { type: string, format: uuid, nullable: true }
      responses:
        '200': { description: OK }
        '422': { $ref: '#/components/responses/ValidationError' }
  /folders/{id}:
    delete:
      tags: [Folders]
      summary: Hapus folder (+ file di dalamnya kembali ke root)
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  /files/upload:
    post:
      tags: [Files]
      summary: Upload file (multipart) — max 10 file, 1GB/file. Return 202.
      security: [{ sanctum: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items: { type: string, format: binary }
                folder_id:
                  type: string
                  format: uuid
      responses:
        '202': { description: Accepted }
        '422': { $ref: '#/components/responses/ValidationError' }
  /files:
    get:
      tags: [Files]
      summary: List file dengan filter
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters:
        - { in: query, name: folder_id, schema: { type: string } }
        - { in: query, name: mime_type, schema: { type: string } }
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: status, schema: { type: string, enum: [pending, uploading, done, failed] } }
        - { in: query, name: sort, schema: { type: string, enum: [name, size, created_at, uploaded_at] } }
        - { in: query, name: dir, schema: { type: string, enum: [asc, desc] } }
        - { in: query, name: per_page, schema: { type: integer, maximum: 100, default: 25 } }
      responses:
        '200': { description: OK }
  /files/{id}:
    get:
      tags: [Files]
      summary: Detail file
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Files]
      summary: Rename file
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 255 }
      responses:
        '200': { description: OK }
    delete:
      tags: [Files]
      summary: Hapus file (GDrive + record + thumbnail)
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }
  /files/{id}/status:
    get:
      tags: [Files]
      summary: Polling status upload
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: OK }
  /files/{id}/download:
    get:
      tags: [Files]
      summary: Stream download dari GDrive
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: Binary stream }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: File belum selesai upload }
  /files/{id}/thumbnail:
    get:
      tags: [Files]
      summary: Thumbnail WebP (image only)
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      responses:
        '200': { description: Binary WebP }
        '404': { description: Thumbnail belum tersedia }
  /files/{id}/move:
    put:
      tags: [Files]
      summary: Pindah file ke folder lain
      security: [{ sanctum: [] }, { apiKey: [] }]
      parameters: [ { $ref: '#/components/parameters/IdPath' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                folder_id: { type: string, format: uuid, nullable: true }
      responses:
        '200': { description: OK }

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    NotFound:
      description: Resource tidak ditemukan
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
  schemas:
    Envelope:
      type: object
      properties:
        success: { type: boolean }
        data: { nullable: true }
        message: { type: string }
        meta: { type: object, additionalProperties: true }
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name: { type: string, maxLength: 100 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        password_confirmation: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    ApiKeyCreateRequest:
      type: object
      required: [label, scopes]
      properties:
        label: { type: string, maxLength: 100 }
        scopes:
          type: array
          minItems: 1
          items: { type: string, enum: [read, write, delete, full] }
        expires_at: { type: string, format: date-time, nullable: true }
