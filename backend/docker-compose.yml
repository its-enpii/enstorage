name: "enstorage"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: enstorage-app
    container_name: enstorage-app
    working_dir: /var/www/html
    volumes:
      # Bind-mount individual subpaths, NOT the whole project. A
      # blanket `./:/var/www/html` mount would shadow the `vendor/`
      # directory that the image bakes in, so `php artisan` would
      # fail with "Failed opening required .../vendor/autoload.php"
      # on every restart.
      - ./storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
      # Laravel runtime config — must live at /var/www/html/.env
      # inside the container. The .env file is gitignored; create it
      # from .env.example on the host before first deploy. Read-only
      # to avoid permission issues if the host file is owned by a
      # different UID than the in-container `www-data` user.
      - ./.env:/var/www/html/.env:ro
      # Persist generated files across container recreations.
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: enstorage
      DB_USERNAME: enstorage
      DB_PASSWORD: ${DB_PASSWORD:-enstorage}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      APP_ENV: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enstorage-net
      - web-network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: enstorage-nginx
    ports:
      # Host port 8081 is taken by another project's phpmyadmin
      # container on this VPS, so we use 8082 instead. Production
      # traffic flows through NPM via web-network on container port
      # 80; this host mapping is for direct debugging from a
      # workstation (curl http://localhost:8082/api/v1/...).
      - "8082:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - enstorage-net
      - web-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: enstorage-worker
    container_name: enstorage-worker
    working_dir: /var/www/html
    volumes:
      # vendor + source are baked into enstorage-worker image (see
      # docker/worker.Dockerfile). Mount only runtime-mutable dirs and
      # credentials — same pattern as the `app` service above. A blanket
      # ./:/var/www/html bind-mount would shadow the baked vendor/ and
      # break artisan (the original crashloop cause).
      - app-storage:/var/www/html/storage
      - ./storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
      # .env must be in the container for artisan to read APP_KEY,
      # DB_*, REDIS_*, GOOGLE_* secrets at runtime. Read-only to avoid
      # permission issues if the host file is owned by a different UID.
      - ./.env:/var/www/html/.env:ro
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: enstorage
      DB_USERNAME: enstorage
      DB_PASSWORD: ${DB_PASSWORD:-enstorage}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enstorage-net
      - web-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: enstorage-postgres
    environment:
      POSTGRES_DB: enstorage
      POSTGRES_USER: enstorage
      POSTGRES_PASSWORD: ${DB_PASSWORD:-enstorage}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enstorage -d enstorage"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - enstorage-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: enstorage-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - enstorage-net
    restart: unless-stopped

  # Laravel Reverb WebSocket server.
  # Image terpisah (php-cli, bukan fpm) karena reverb:start adalah
  # long-lived process, tidak cocok dengan php-fpm.
  # Port 8083 host → 8083 container (frontend connect ke ws://localhost:8083).
  # vendor/ dibake ke image dari composer.lock — tidak shadow oleh
  # bind-mount karena tidak ada mount ke /var/www/html. Hanya .env yang
  # di-mount untuk baca REVERB_APP_SECRET dll.
  reverb:
    build:
      context: .
      dockerfile: docker/reverb.Dockerfile
    image: enstorage-reverb
    container_name: enstorage-reverb
    working_dir: /var/www/html
    volumes:
      - ./.env:/var/www/html/.env:ro
    environment:
      APP_ENV: local
    ports:
      # Host port 8083 → container port 8080 (Reverb listens on 8080 inside).
      - "8083:8080"
    networks:
      - enstorage-net
    restart: unless-stopped

volumes:
  app-storage:
  app-bootstrap-cache:
  postgres-data:
  redis-data:

networks:
  enstorage-net:
    driver: bridge
  # External network shared with the host's reverse proxy (Nginx Proxy
  # Manager, Traefik, etc.). Create it on the host BEFORE first
  # `docker compose up`:
  #   docker network create web-network
  # The host proxy then resolves container hostnames like `web` or `app`
  # via this network.
  web-network:
    external: true
      