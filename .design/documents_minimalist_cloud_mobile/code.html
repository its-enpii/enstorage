<script>
        // Micro-interaction for cards
        document.querySelectorAll('.rounded-2xl').forEach(card => {
            card.addEventListener('mousedown', () => {
                card.style.transform = 'scale(0.98)';
            });
            card.addEventListener('mouseup', () => {
                card.style.transform = 'scale(1.02)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'scale(1)';
            });
        });

        // Floating behavior for FAB on scroll
        let lastScroll = 0;
        const fab = document.querySelector('.fixed.bottom-24');
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll > lastScroll && currentScroll > 100) {
                fab.style.transform = 'translateY(20px) scale(0.9)';
                fab.style.opacity = '0.7';
            } else {
                fab.style.transform = 'translateY(0) scale(1)';
                fab.style.opacity = '1';
            }
            lastScroll = currentScroll;
        });
    </script>
