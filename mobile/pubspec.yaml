name: enstorage
description: EnStorage mobile client — premium cloud vault for Google Drive.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # i18n
  intl: ^0.20.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Pickers / camera
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Viewer
  photo_view: ^0.15.0
  video_player: ^2.9.2
  flutter_pdfview: ^1.3.4
  audioplayers: ^6.1.0
  open_filex: ^4.5.0

  # Utils
  path: ^1.9.0
  path_provider: ^2.1.4
  mime: ^1.0.6
  collection: ^1.18.0
  share_plus: ^10.1.2
  url_launcher: ^6.3.0

  # Google Sign-In. Pinned to v6.x because v7's native Android SDK
  # uses Android Credential Manager (HiddenActivity), which renders
  # a stuck/non-interactive picker on Infinix / Transsion devices
  # running GMS 26.x. v6 uses an intent-based WebView flow that
  # works on these devices.
  google_sign_in: ^6.2.0
  flutter_svg: ^2.3.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.6

flutter_native_splash:
  color: "#F3F3F3"
  color_dark: "#040303"
  image: assets/splash/logo.png
  android_12:
    color: "#F3F3F3"
    color_dark: "#040303"
    image: assets/splash/logo_android12.png
    icon_background_color: "#F3F3F3"
    icon_background_color_dark: "#040303"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/icon/
