name: enstorage
description: EnStorage mobile client — Never Leaves Your Drive.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  # Used by realtime_service to POST /broadcasting/auth for channel
  # subscribe signatures (Pusher protocol). Kept separate so the WS
  # layer doesn't depend on dio's interceptor chain.
  http: ^1.2.2

  # WebSocket transport. We talk to Laravel Reverb directly via the
  # Pusher wire protocol using web_socket_channel — the Pusher Flutter
  # SDK's init API doesn't expose host/port for self-hosted brokers
  # like Reverb. The protocol surface we use is small (connect +
  # subscribe + a few event types) so a hand-rolled client is simpler
  # than fighting the SDK's assumption of Pusher Cloud (cluster-based).
  web_socket_channel: ^3.0.1

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # i18n
  intl: ^0.20.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Pickers / camera
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Viewer
  photo_view: ^0.15.0
  video_player: ^2.9.2
  flutter_pdfview: ^1.3.4
  audioplayers: ^6.1.0
  open_filex: ^4.5.0

  # Utils
  path: ^1.9.0
  path_provider: ^2.1.4
  mime: ^1.0.6
  collection: ^1.18.0
  share_plus: ^10.1.2
  url_launcher: ^6.3.0

  # Google Sign-In. Pinned to v6.x because v7's native Android SDK
  # uses Android Credential Manager (HiddenActivity), which renders
  # a stuck/non-interactive picker on Infinix / Transsion devices
  # running GMS 26.x. v6 uses an intent-based WebView flow that
  # works on these devices.
  google_sign_in: ^6.2.0
  flutter_svg: ^2.3.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.6

flutter_native_splash:
  color: "#F3F3F3"
  # Match `theme/colors.dart` AppColors.black (#111319) — the actual
  # dark-mode scaffold background. The previous #040303 came from
  # the Enpii brand palette but is NOT what the app paints after
  # Flutter takes over, so users saw a visible color jump at launch.
  color_dark: "#111319"
  image: assets/splash/logo.png
  android_12:
    color: "#F3F3F3"
    color_dark: "#111319"
    image: assets/splash/logo_android12.png
    icon_background_color: "#F3F3F3"
    icon_background_color_dark: "#111319"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/icon/
