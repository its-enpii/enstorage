name: enstorage
description: EnStorage mobile client — premium cloud vault for Google Drive.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # i18n
  intl: ^0.20.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Pickers / camera
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Viewer
  photo_view: ^0.15.0
  video_player: ^2.9.2
  flutter_pdfview: ^1.3.4
  audioplayers: ^6.1.0
  open_filex: ^4.5.0

  # Utils
  path: ^1.9.0
  path_provider: ^2.1.4
  mime: ^1.0.6
  collection: ^1.18.0
  share_plus: ^10.1.2
  url_launcher: ^6.3.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
