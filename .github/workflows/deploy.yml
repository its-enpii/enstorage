name: Deploy

on:
  push:
    branches: [main]
    # Only deploy when shipped product code changes. Internal/dev folders
    # (.design/, .guide/), docs/, mobile/ and other paths are ignored —
    # they don't affect the running stack. The root docker-compose.yml
    # is included so infra-only changes still trigger.
    paths:
      - 'backend/**'
      - 'web/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            # Assumes the SSH user is already in the repo directory
            # (e.g. `cd /opt/enstorage` in their shell rc, or run a
            # `cd /path/to/repo` here). Edit `cd` below if needed.
            cd //home/enpii/studio/enstorage

            # Inject runtime secrets into a local .env file. The repo's
            # docker-compose.yml references these via ${VAR:-default},
            # so leaving them empty falls back to the in-compose
            # defaults — useful for first-time deploys.
            #
            # Reverb vars are required for the web build to bake the
            # WSS endpoint config into the JS bundle. If NEXT_PUBLIC_REVERB_APP_KEY
            # is missing, Next.js emits `process.env.NEXT_PUBLIC_REVERB_APP_KEY`
            # literally and the browser throws "process is not defined",
            # killing the entire Echo WS connection.
            cat > .env <<EOF
            NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_REVERB_SCHEME=${{ secrets.NEXT_PUBLIC_REVERB_SCHEME }}
            NEXT_PUBLIC_REVERB_HOST=${{ secrets.NEXT_PUBLIC_REVERB_HOST }}
            NEXT_PUBLIC_REVERB_PORT=${{ secrets.NEXT_PUBLIC_REVERB_PORT }}
            NEXT_PUBLIC_REVERB_APP_KEY=${{ secrets.NEXT_PUBLIC_REVERB_APP_KEY }}
            EOF

            git pull origin main

            docker network inspect web-network >/dev/null 2>&1 || docker network create web-network
            docker compose up -d --build

            # Stale bootstrap/cache from dev providers (e.g.
            # Laravel\Pail) can survive bind-mounts. Wipe and let
            # artisan rebuild against the production vendor.
            docker compose exec -T app rm -f bootstrap/cache/packages.php bootstrap/cache/services.php
            docker compose exec -T app php artisan package:discover --ansi
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan cache:clear
            docker compose exec -T app php artisan migrate --force