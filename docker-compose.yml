# Root-level production stack. Composes backend services (Laravel +
# Postgres + Redis + Nginx + worker) with the Next.js web container.
#
# Usage on the VPS:
#   docker compose -f docker-compose.yml up -d
#
# Notes:
#   * Backend lives in backend/docker-compose.yml and is `include`d here
#     so the two stacks share networks (web-network) and can talk to
#     each other by container name (`app`, `web`).
#   * web container publishes 3001:3000 (host:3001 → container:3000) to
#     avoid clashing with anything else holding host port 3000.
#   * Both stacks attach to the external `web-network` so Nginx Proxy
#     Manager (running on the host) can resolve `web` and `app` by name.
#   * Internal service-to-service traffic (app ↔ postgres, app ↔ redis)
#     stays on `enstorage-net` which is NOT attached to web-network.
#
# Required external resources on the host (one-time setup):
#   docker network create web-network

name: enstorage-prod

include:
  - path: ./backend/docker-compose.yml

# Production overrides for included services. The backend's reverb
# container listens on 0.0.0.0:8080 (any interface) by default, which
# works for NPM-over-web-network, but we also want a stable public
# hostname the web client can resolve when the browser opens the WS
# connection. The host/port of the WS endpoint is encoded in
# NEXT_PUBLIC_REVERB_* (set on `web` above) and the matching TLS
# termination must be configured in NPM. See README "Reverb / WSS" for
# the reverse-proxy location block that pairs with this stack.

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are baked into the JS bundle at build time,
      # so they must be passed as build args (not just runtime env).
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://enpii.enpiistudio.com/api/v1}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        # Reverb WS endpoint — defaults to same host as API (port 443
        # for wss://). NPM must terminate the WSS upgrade and forward
        # to reverb:8080 over web-network. Override in .env if your
        # NPM proxy lives on a different path/host.
        NEXT_PUBLIC_REVERB_SCHEME: ${NEXT_PUBLIC_REVERB_SCHEME:-wss}
        NEXT_PUBLIC_REVERB_HOST: ${NEXT_PUBLIC_REVERB_HOST:-enpii.enpiistudio.com}
        NEXT_PUBLIC_REVERB_PORT: ${NEXT_PUBLIC_REVERB_PORT:-443}
        NEXT_PUBLIC_REVERB_APP_KEY: ${NEXT_PUBLIC_REVERB_APP_KEY:-}
    image: enstorage-web:latest
    container_name: enstorage-web
    environment:
      NODE_ENV: production
      # Mirror to runtime env so SSR (server components) can read them too.
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://enpii.enpiistudio.com/api/v1}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_REVERB_SCHEME: ${NEXT_PUBLIC_REVERB_SCHEME:-wss}
      NEXT_PUBLIC_REVERB_HOST: ${NEXT_PUBLIC_REVERB_HOST:-enpii.enpiistudio.com}
      NEXT_PUBLIC_REVERB_PORT: ${NEXT_PUBLIC_REVERB_PORT:-443}
      NEXT_PUBLIC_REVERB_APP_KEY: ${NEXT_PUBLIC_REVERB_APP_KEY:-}
    depends_on:
      - app   # just so web waits; it actually talks to `app` via NPM, not directly
    networks:
      - web-network
    # host:3001 because host:3000 is taken by another container on the
    # VPS. NPM forwards `enpii.studio` → `web:3000` over web-network
    # (NOT through the host port — the port mapping is only a fallback).
    ports:
      - "3001:3000"
    restart: unless-stopped

networks:
  web-network:
    external: true